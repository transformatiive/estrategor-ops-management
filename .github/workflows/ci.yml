name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @estrategor/api prisma:generate

      - name: Prisma validate
        run: pnpm --filter @estrategor/api prisma:validate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/estrategor

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build web
        run: pnpm --filter @estrategor/web build
